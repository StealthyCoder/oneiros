name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install dev tools only (skip ML deps, not needed for linting)
        run: uv sync --only-dev --locked

      - name: black
        run: uv run --no-sync black --check .

      - name: isort
        run: uv run --no-sync isort --check-only .

      - name: flake8
        run: uv run --no-sync flake8 .
